<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown to May 26, 2027</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Countdown</h1>
    <p class="subtitle">May 26, 2027</p>
    <div class="cards">
      <div class="card">
        <span class="value" id="days">000</span>
        <span class="label">Days</span>
      </div>
      <div class="card">
        <span class="value" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="card">
        <span class="value" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="card">
        <span class="value" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
      <div class="card">
        <span class="value" id="milliseconds">000</span>
        <span class="label">Milliseconds</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
